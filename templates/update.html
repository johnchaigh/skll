{% extends "layout.html" %}

{% block title %}
    Compare
{% endblock %}

{% block style %}



{% endblock %}

{% block header%}
    {{header}}
{% endblock %}

{% block main %}
<div id="center">
    <form action="/update" method="post" id="form">
      <h4>Paste in a new CV to update your skills</h4>
      <textarea autocomplete="off" autofocus class="form-control" name="CV" type="text" rows="8" cols="80"></textarea>
        <div id="padding">
          <button class="btn btn-outline-dark" type="submit" style="padding: 5px 10px;">Submit</button>
        </div>
    </form>
</div>

{% endblock %}
